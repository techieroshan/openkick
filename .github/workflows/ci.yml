name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm --filter @openkick/types build
      - name: Generate Prisma Client
        working-directory: apps/bff
        run: pnpm prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build:ac
      - run: pnpm build:traceability
      - run: pnpm test:unit
      - name: Build web
        working-directory: apps/web
        run: pnpm build
      - name: Build bff
        working-directory: apps/bff
        run: pnpm build
      - name: Migrate Database
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
        working-directory: apps/bff
        run: pnpm prisma migrate deploy
      - name: Start services
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          PORT: 3001
        run: |
          pnpm --filter @openkick/bff start &
          sleep 5
          VITE_API_URL=http://localhost:3001 pnpm --filter @openkick/web preview --port 4173 &
          sleep 5
      - name: E2E tests
        run: VITE_API_URL=http://localhost:3001 pnpm test:e2e
      - name: Traceability check
        run: pnpm check:traceability || echo "Traceability check skipped (soft mode)"
