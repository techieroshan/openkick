name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build:ac
      - run: pnpm build:traceability
      - run: pnpm test:unit
      - name: Build web
        working-directory: apps/web
        run: pnpm build
      - name: Build bff
        working-directory: apps/bff
        run: pnpm build
      - name: Start services
        run: |
          pnpm --filter @openkick/bff start &
          sleep 3
          pnpm --filter @openkick/web preview --port 4173 &
          sleep 5
      - name: E2E tests
        run: pnpm test:e2e
      - name: Traceability check
        run: pnpm check:traceability || echo "Traceability check skipped (soft mode)"
