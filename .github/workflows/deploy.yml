name: deploy-openkick

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT || '6150' }}
      APP_PORT: "11701"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PNPM
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages and Generate Prisma
        run: |
          pnpm --filter @openkick/types build
          cd apps/bff && pnpm prisma generate

      - name: Verify deployment secrets
        run: |
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Build web and bff
        run: |
          pnpm --filter @openkick/web build
          pnpm --filter @openkick/bff build

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p ~/openkick"
          rsync -avz --delete -e "ssh -p $SSH_PORT" . "$DEPLOY_USER@$DEPLOY_HOST:~/openkick/"
          ssh -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cd ~/openkick && docker compose -f docker-compose.prod.yml up -d --build"

      - name: Verify app endpoint
        run: |
          echo "Deployment is configured for host port ${APP_PORT} on ${DEPLOY_HOST} via SSH port ${SSH_PORT}."
