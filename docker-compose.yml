version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openkick-postgres
    restart: always
    environment:
      POSTGRES_USER: openkick
      POSTGRES_PASSWORD: openkick_password
      POSTGRES_DB: openkick
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
